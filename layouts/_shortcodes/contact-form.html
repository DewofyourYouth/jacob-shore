<div class="not-prose mt-r-xl">
  <form id="contact-form" novalidate>
    <div class="flex flex-col gap-5">

      <div>
        <label for="cf-name" class="block text-sm font-medium text-neso-fg2 mb-2">Name</label>
        <input
          id="cf-name"
          name="name"
          type="text"
          required
          autocomplete="name"
          class="w-full px-4 py-3 rounded-xl border border-neso-deco3 bg-neso-bg2 text-neso-fg1 placeholder:text-neso-fg3 focus:outline-none focus:border-neso-splash transition-colors"
          placeholder="Your name"
        />
      </div>

      <div>
        <label for="cf-email" class="block text-sm font-medium text-neso-fg2 mb-2">Email</label>
        <input
          id="cf-email"
          name="email"
          type="email"
          required
          autocomplete="email"
          class="w-full px-4 py-3 rounded-xl border border-neso-deco3 bg-neso-bg2 text-neso-fg1 placeholder:text-neso-fg3 focus:outline-none focus:border-neso-splash transition-colors"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label for="cf-message" class="block text-sm font-medium text-neso-fg2 mb-2">Message</label>
        <textarea
          id="cf-message"
          name="message"
          required
          rows="5"
          class="w-full px-4 py-3 rounded-xl border border-neso-deco3 bg-neso-bg2 text-neso-fg1 placeholder:text-neso-fg3 focus:outline-none focus:border-neso-splash transition-colors resize-y"
          placeholder="What are you working on?"
        ></textarea>
      </div>

      <div id="cf-status" class="hidden text-sm px-4 py-3 rounded-xl border" aria-live="polite"></div>

      <div>
        <button
          id="cf-submit"
          type="submit"
          class="px-6 py-3 rounded-xl font-medium text-white bg-neso-splash hover:opacity-90 focus-visible:opacity-90 active:opacity-75 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Send message
        </button>
      </div>

    </div>
  </form>
</div>

<script>
(function () {
  var form    = document.getElementById('contact-form');
  var btn     = document.getElementById('cf-submit');
  var status  = document.getElementById('cf-status');

  function showStatus(ok, msg) {
    status.textContent = msg;
    status.className = ok
      ? 'text-sm px-4 py-3 rounded-xl border border-green-500/40 bg-green-500/10 text-green-700 dark:text-green-400'
      : 'text-sm px-4 py-3 rounded-xl border border-red-500/40 bg-red-500/10 text-red-700 dark:text-red-400';
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    var name    = document.getElementById('cf-name').value.trim();
    var email   = document.getElementById('cf-email').value.trim();
    var message = document.getElementById('cf-message').value.trim();

    if (!name || !email || !message) {
      showStatus(false, 'Please fill in all fields.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Sending…';
    status.className = 'hidden';

    fetch('/api/contact', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name: name, email: email, message: message }),
    })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.ok) {
          showStatus(true, 'Message sent — I\'ll be in touch soon.');
          form.reset();
        } else {
          showStatus(false, data.error || 'Something went wrong. Please try again.');
        }
      })
      .catch(function () {
        showStatus(false, 'Network error. Please check your connection and try again.');
      })
      .finally(function () {
        btn.disabled    = false;
        btn.textContent = 'Send message';
      });
  });
})();
</script>
