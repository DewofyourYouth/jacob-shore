baseURL: "https://jacob-shore.com/"
languageCode: "en-us"
title: "Jacob Shore"
description: "The hub of all things Jacob Shore."
theme: "neso"
enableRobotsTXT: true

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"

menus:
  main:
    - name: "Home"
      url: "/#top"
      weight: 1
    - name: "About"
      url: "/#about"
      weight: 2
    - name: "Projects"
      url: "/#projects"
      weight: 3
    - name: "Latest"
      url: "/latest/"
      weight: 4
    - name: "Bio"
      url: "/bio/"
      weight: 5
    - name: "Hire Me"
      url: "/hire/"
      weight: 6

params:
  description: "The hub of all things Jacob Shore."
  turnstile:
    site_key: "0x4AAAAAADXKJhH82MPoyOFb"
  feeds:
    latest:
      - name: "Dew of Your Youth"
        json: "https://www.dewofyouryouth.com/index.json"
        base_url: "https://www.dewofyouryouth.com"
      - name: "Daily Derja"
        json: "https://dailyderja.com/index.json"
        base_url: "https://dailyderja.com"
      - name: "Türk Defter"
        json: "https://turk-defter.com/index.json"
        base_url: "https://turk-defter.com"
  now: "Recovering."
  author:
    name: "Jacob Shore"
    bio: "Software engineer, language learner, and builder of small but stubborn projects."
    location: "Bet Shemesh, Israel"
    avatar: "/images/avatar.jpg"
  neso:
    branding:
      favicon_ico: "/images/favicon.ico"
      apple_touch_icon: "/images/apple-touch-icon-180.png"
      pwa_icon_192: "/images/android-chrome-192x192.png"
      pwa_icon_512: "/images/android-chrome-512x512.png"
      og_image: "img/jacob_og_1200x630.png"
    seo:
      site_description: "Jacob Shore — software engineer, ordained rabbi, and polyglot in Bet Shemesh, Israel. Backend systems, Kubernetes and cloud infrastructure, and AI integration, plus writing and language-learning projects."
      site_keywords:
        - "Jacob Shore"
        - "software engineer"
        - "backend engineer"
        - "Kubernetes"
        - "cloud infrastructure"
        - "AI integration"
        - "RAG"
        - "Bet Shemesh"
        - "Israel"
        - "polyglot"
      schema:
        publisher_type: "Person"
    enableGitInfo: true
    support_theme_author: true
    social:
      links:
        - name: "GitHub"
          url: "https://github.com/DewofyourYouth"
        - name: "LinkedIn"
          url: "https://www.linkedin.com/in/jacob-shore-86094725a/"
        - name: "X"
          url: "https://x.com/JacobShore19"
        - name: "Instagram"
          url: "https://www.instagram.com/yaakshore/"
        - name: "YouTube"
          url: "https://www.youtube.com/@dewofyouryouth"
        # - name: "Discord"
        #   url: "https://discord.com/invite/mKGhJ3eQ"
        - name: "Telegram"
          url: "https://t.me/+muANXhcSRCdmMDA0"
        - name: "WhatsApp"
          url: "https://whatsapp.com/channel/0029VbBwSpQ7tkjIkExMTA2e"
    home:
      display_mode: "profile"
      profile:
        avatar_image: "img/jacob_pixel_512.png"

build:
  buildStats:
    enable: true
  cachebusters:
    - source: "assets/notwatching/hugo_stats\\.json"
      target: "css"
    - source: "(postcss|tailwind)\\.config\\.js"
      target: "css"

module:
  mounts:
    - source: "assets"
      target: "assets"
    - disableWatch: true
      source: "hugo_stats.json"
      target: "assets/notwatching/hugo_stats.json"

security:
  http:
    methods: ["GET"]
    urls:
      - "https://dailyderja.com/"
      - "https://dailyderja.com/index.json"
      - "https://turk-defter.com/"
      - "https://turk-defter.com/index.json"
      - "https://dewofyouryouth.com/"
      - "https://dewofyouryouth.com/index.json"
      - "https://www.dewofyouryouth.com/"
      - "https://www.dewofyouryouth.com/index.json"
